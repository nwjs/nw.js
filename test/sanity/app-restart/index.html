<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>app-restart</title>
</head>
<body>
  <script>
    const fs = require('fs');
    const gui = require('nw.gui');
    const path = require('path');
    const testDir = process.env.APP_RESTART_TEST_DIR || process.cwd();
    const statePath = path.join(testDir, 'restart-state.json');
    const resultPath = path.join(testDir, 'restart-result.json');

    function writeResult(success, message) {
      fs.writeFileSync(resultPath, JSON.stringify({
        success,
        message,
        argv: nw.App.argv,
        fullArgv: nw.App.fullArgv
      }));
      nw.App.quit();
    }

    window.onload = function() {
      if (typeof nw.App.restart !== 'function') {
        writeResult(false, 'nw.App.restart is not a function');
        return;
      }
      if (typeof gui.App.restart !== 'function') {
        writeResult(false, 'gui.App.restart is not a function');
        return;
      }

      if (fs.existsSync(statePath)) {
        const firstRun = JSON.parse(fs.readFileSync(statePath, 'utf8'));
        const fullArgv = nw.App.fullArgv.join('\n');
        const hasSwitch = fullArgv.indexOf('--restart-test-flag=present') !== -1;
        const hasArg = fullArgv.indexOf('plain-restart-arg') !== -1;
        const newProcess = firstRun.pid !== process.pid;

        writeResult(
          hasSwitch && hasArg && newProcess,
          JSON.stringify({hasSwitch, hasArg, newProcess})
        );
        return;
      }

      fs.writeFileSync(statePath, JSON.stringify({
        pid: process.pid,
        argv: nw.App.argv,
        fullArgv: nw.App.fullArgv
      }));
      nw.App.restart();
    };
  </script>
</body>
</html>
